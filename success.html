<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pembayaran Berhasil</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{overflow-x:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at top left, rgba(255,215,0,.12), transparent 35%),linear-gradient(135deg,#12051f,#2d0b45,#4c1d95,#7e22ce);color:#fff}
.card{max-width:650px;width:100%;text-align:center;background:rgba(255,255,255,.12);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.15);border-radius:28px;padding:35px}
.icon{font-size:80px;margin-bottom:15px}
h1{color:#FFD700;margin-bottom:10px}
.ticket{margin:18px 0;padding:15px;border-radius:18px;background:rgba(255,255,255,.08)}
.btn{display:inline-block;margin-top:20px;padding:14px 24px;border-radius:14px;text-decoration:none;background:linear-gradient(135deg,#FFD700,#FFB300);color:#111;font-weight:800}
</style></head>
<body><div class="card">
<div class="icon">🎉</div>
<h1>Pembayaran Berhasil</h1>
<p>Tiket Anda telah berhasil dikonfirmasi.</p>
<div class="ticket">
<div><b>Nama:</b> <span id="nama">-</span></div>
<div><b>Jenis Tiket:</b> <span id="jenis">-</span></div>
<div><b>Jumlah Tiket:</b> <span id="jumlah">-</span></div>
</div>
<a href="#" class="btn">Unduh E-Ticket</a>
</div>
<script>
document.getElementById('nama').textContent=localStorage.getItem('nama')||'-';
document.getElementById('jenis').textContent=localStorage.getItem('jenisTiket')||'-';
document.getElementById('jumlah').textContent=localStorage.getItem('jumlahTiket')||'-';
</script>
</body></html>
