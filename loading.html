<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memproses Pembayaran</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b0f1a;
  color:#fff;
}

.card{
  width:90%;
  max-width:420px;
  padding:32px;
  border-radius:24px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,0.06);
}

h1{
  font-size:18px;
  font-weight:600;
  text-align:center;
}

.sub{
  text-align:center;
  font-size:13px;
  opacity:.5;
  margin-top:6px;
}

/* USER INFO */
.user{
  text-align:center;
  font-size:13px;
  opacity:.7;
  margin-top:15px;
}

/* LOADER */
.loader{
  width:60px;
  height:60px;
  margin:25px auto;
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.1);
  border-top:3px solid #fff;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* STEP */
.item{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  font-size:13px;
  opacity:.4;
  transition:.4s;
}

.item.active{opacity:1}
.item.done{opacity:.6}

/* PROGRESS */
.bar{
  height:3px;
  background:rgba(255,255,255,0.08);
  border-radius:999px;
  overflow:hidden;
  margin-top:15px;
}

.fill{
  height:100%;
  width:0%;
  background:#fff;
  transition:1s ease;
}

/* TIMER */
.timer{
  text-align:center;
  margin-top:10px;
  font-size:12px;
  opacity:.4;
}
</style>
</head>

<body>

<div class="card">

<h1>Memproses Pembayaran</h1>
<div class="sub">Mohon tunggu sebentar</div>

<div class="user">
  <div id="nama"></div>
  <div id="order"></div>
  <div id="total"></div>
</div>

<div class="loader"></div>

<div class="item active" id="s1">Validasi data</div>
<div class="item" id="s2">Verifikasi pembayaran</div>
<div class="item" id="s3">Menyiapkan tiket</div>

<div class="bar"><div class="fill" id="fill"></div></div>

<div class="timer">Selesai dalam <span id="t">20</span> detik</div>

</div>

<script>
// AMBIL DATA DARI QRIS / FORM (TANPA DEMO)
const nama = localStorage.getItem("nama") || "-";
const order = localStorage.getItem("orderId") || "-";
const total = localStorage.getItem("totalPembayaran") || "0";

// TAMPILKAN
document.getElementById("nama").innerText = "Nama: " + nama;
document.getElementById("order").innerText = "Order: " + order;
document.getElementById("total").innerText = "Total: Rp " + Number(total).toLocaleString('id-ID');

// ANIMASI
const fill=document.getElementById("fill");

setTimeout(()=>{s1.classList.add("done"); s2.classList.add("active"); fill.style.width="40%";},3000);
setTimeout(()=>{s2.classList.add("done"); s3.classList.add("active"); fill.style.width="80%";},8000);
setTimeout(()=>{s3.classList.add("done"); fill.style.width="100%";},14000);

// TIMER
let time=20;
const tEl=document.getElementById("t");

const interval=setInterval(()=>{
  time--;
  tEl.innerText=time;

  if(time<=0){
    clearInterval(interval);
    window.location.href="success.html";
  }
},1000);
</script>

</body>
</html>
